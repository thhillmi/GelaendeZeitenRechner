<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Equestrian Toolbox – App verfügbar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0b0f0c;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      max-width: 420px;
      padding: 32px 24px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
    }
    img {
      width: 140px;
      height: 140px;
      border-radius: 28px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: #cfd6d2;
      margin-bottom: 24px;
    }
    a.button {
      display: inline-block;
      padding: 14px 22px;
      background: #22c55e;
      color: #000;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
    }
    a.button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="card">
    <!-- App Icon -->
    <img src="EquiPace.png" alt="Equestrian Toolbox App Icon">

    <h1>Equestrian Toolbox</h1>

    <p>
      Tool jetzt als App verfügbar.<br>
      Hier der Link zum App Store.
    </p>

    <!-- App Store Link -->
    <a class="button"
       href="https://apps.apple.com/app/idXXXXXXXXXX"
       target="_blank" rel="noopener">
      Zum App Store
    </a>
  </div>
</body>
</html>
