<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gel&auml;ndeZeiten &middot; Rechner</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07100a;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.09);
            --border-hi: rgba(255,255,255,0.17);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --green-ring: rgba(34,197,94,0.28);
            --green-glow: rgba(34,197,94,0.30);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.10);
            --red-ring: rgba(248,113,113,0.26);
            --blue: #60a5fa;
            --text: #f1f5f9;
            --muted: rgba(241,245,249,0.46);
            --faint: rgba(241,245,249,0.24);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --r: 14px;
            --r-sm: 10px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            -webkit-text-size-adjust: 100%;
            overflow-x: hidden;
        }
        .hero { position: relative; height: clamp(200px, 42svh, 340px); overflow: hidden; }
        .hero img { width: 100%; height: 100%; object-fit: cover; object-position: center 28%; display: block; }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(7,16,10,0.04) 0%, rgba(7,16,10,0.50) 55%, rgba(7,16,10,1.00) 100%);
        }
        .hero-copy { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 20px 26px; }
        .eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--green); margin-bottom: 7px; }
        .hero-title { font-size: clamp(28px, 8vw, 50px); font-weight: 900; line-height: 1.0; letter-spacing: -1.5px; color: #fff; text-shadow: 0 4px 40px rgba(0,0,0,0.85); }
        .hero-title em { font-style: normal; background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .main { max-width: 640px; margin: 0 auto; padding: 24px 16px calc(max(80px, env(safe-area-inset-bottom)) + 64px); }
        .caption { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--faint); margin-bottom: 12px; }
        .track-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 12px; }
        .track-card.green { border-top: 2px solid var(--green); }
        .track-card.red   { border-top: 2px solid var(--red); }
        .track-head { display: flex; align-items: center; gap: 9px; padding: 13px 16px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text); border-bottom: 1px solid var(--border); }
        .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .green .dot { background: var(--green); box-shadow: 0 0 7px var(--green); }
        .red   .dot { background: var(--red);   box-shadow: 0 0 7px var(--red); }
        .track-body { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 16px 16px; }
        .f-full { grid-column: 1 / -1; }
        @media (min-width: 420px) { .track-body { grid-template-columns: 1.1fr 1fr 1fr; } .f-full { grid-column: auto; } }
        .field label { display: block; font-size: 9px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        .field input {
            width: 100%; font-size: 17px; font-family: var(--font); font-weight: 700;
            text-align: center; color: var(--text);
            background: rgba(255,255,255,0.055); border: 1px solid var(--border-hi);
            border-radius: var(--r-sm); padding: 12px 8px; min-height: 50px;
            outline: none; -webkit-appearance: none; appearance: none;
            transition: border-color .18s, background .18s, box-shadow .18s;
        }
        .green .field input:focus { border-color: var(--green); background: var(--green-dim); box-shadow: 0 0 0 3px var(--green-ring); }
        .red   .field input:focus { border-color: var(--red);   background: var(--red-dim);   box-shadow: 0 0 0 3px var(--red-ring); }
        .field input.err { border-color: var(--red) !important; background: var(--red-dim) !important; animation: shake .35s ease; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-5px); } 40%,80% { transform: translateX(5px); } }
        input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=number] { -moz-appearance: textfield; }
        .calc-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 10px 16px max(10px, env(safe-area-inset-bottom));
            background: rgba(7,16,10,0.90);
            backdrop-filter: blur(20px) saturate(1.6); -webkit-backdrop-filter: blur(20px) saturate(1.6);
            border-top: 1px solid var(--border); z-index: 100;
        }
        .calc-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; max-width: 640px; margin: 0 auto; min-height: 52px;
            font-family: var(--font); font-size: 15px; font-weight: 700; letter-spacing: .4px;
            color: #000; background: var(--green); border: none; border-radius: var(--r-sm);
            cursor: pointer; box-shadow: 0 0 28px var(--green-glow);
            transition: opacity .18s, transform .14s, box-shadow .18s;
            -webkit-tap-highlight-color: transparent;
        }
        .calc-btn:active { transform: scale(.97); opacity: .82; }
        @media (hover: hover) { .calc-btn:hover { box-shadow: 0 0 44px var(--green-glow); opacity: .90; } }
        .results { margin-top: 28px; }
        .hr { height: 1px; background: linear-gradient(90deg, transparent, var(--border-hi), transparent); margin-bottom: 24px; }

        /* Results: side-by-side on wide screens, stacked on mobile */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media (min-width: 580px) {
            .results-grid { grid-template-columns: 1fr 1fr; }
        }

        /* Result table card */
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

        .result-card.green { border-top: 2px solid var(--green); }
        .result-card.red   { border-top: 2px solid var(--red); }

        .result-card-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 11px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text);
            border-bottom: 1px solid var(--border);
        }
        .result-card.green .result-card-head { background: rgba(34,197,94,0.10); }
        .result-card.red   .result-card-head { background: rgba(248,113,113,0.10); }

        /* Table */
        table.rt {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        table.rt thead th {
            padding: 7px 10px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        table.rt tbody td {
            padding: 9px 10px;
            text-align: center;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        table.rt tbody tr:last-child td { border-bottom: none; }

        /* Alternating row tint */
        table.rt tbody tr:nth-child(even) { background: rgba(255,255,255,0.025); }

        /* Final (full distance) row */
        table.rt tbody tr.final td {
            font-weight: 800;
            font-size: 14px;
        }
        .result-card.green table.rt tbody tr.final { background: rgba(34,197,94,0.12); }
        .result-card.red   table.rt tbody tr.final { background: rgba(248,113,113,0.10); }

        /* Column colours */
        .col-dist  { color: var(--muted) !important; font-size: 12px !important; }
        .col-best  { color: var(--green); }
        .col-allow { color: var(--red); }
        .col-avg   { color: var(--blue); }

        [x-cloak] { display: none !important; }

        /* Language toggle button */
        .lang-btn {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            right: 16px;
            z-index: 200;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.80);
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.20);
            border-radius: 99px;
            padding: 6px 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background .2s, color .2s;
            -webkit-tap-highlight-color: transparent;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
    </style>
</head>
<body x-data="app()">

<button class="lang-btn" @click="lang = lang === 'de' ? 'en' : 'de'" x-text="lang === 'de' ? 'EN' : 'DE'"></button>

<div class="hero">
    <img src="Designer.png" alt="Gelaendefahren">
    <div class="hero-overlay"></div>
    <div class="hero-copy">
        <p class="eyebrow" x-text="t('eyebrow')"></p>
        <h1 class="hero-title" x-html="t('title')"></h1>
    </div>
</div>

<div class="main">
    <p class="caption" x-text="t('caption')"></p>

    <div class="track-card green">
        <div class="track-head"><div class="dot"></div><span x-text="t('trackA')"></span></div>
        <div class="track-body">
            <div class="field f-full">
                <label x-text="t('length')"></label>
                <input type="number" x-model="A.len" inputmode="numeric" :class="e.Al && 'err'" @input="e.Al=false">
            </div>
            <div class="field">
                <label>Best (min:sec)</label>
                <input type="text" x-model="A.best" inputmode="decimal" placeholder="12:00" :class="e.Ab && 'err'" @input="e.Ab=false" @focus="$el.select()">
            </div>
            <div class="field">
                <label x-text="t('allowed')"></label>
                <input type="text" x-model="A.allow" inputmode="decimal" placeholder="14:00" :class="e.Aa && 'err'" @input="e.Aa=false" @focus="$el.select()">
            </div>
        </div>
    </div>

    <div class="track-card red">
        <div class="track-head"><div class="dot"></div><span x-text="t('trackB')"></span></div>
        <div class="track-body">
            <div class="field f-full">
                <label x-text="t('length')"></label>
                <input type="number" x-model="B.len" inputmode="numeric" :class="e.Bl && 'err'" @input="e.Bl=false">
            </div>
            <div class="field">
                <label>Best (min:sec)</label>
                <input type="text" x-model="B.best" inputmode="decimal" placeholder="13:00" :class="e.Bb && 'err'" @input="e.Bb=false" @focus="$el.select()">
            </div>
            <div class="field">
                <label x-text="t('allowed')"></label>
                <input type="text" x-model="B.allow" inputmode="decimal" placeholder="15:00" :class="e.Ba && 'err'" @input="e.Ba=false" @focus="$el.select()">
            </div>
        </div>
    </div>

    <div class="results" x-show="done" x-cloak x-ref="results">
        <div class="hr"></div>
        <div class="results-grid">

            <!-- Track A result table -->
            <div class="result-card green">
                <div class="result-card-head">
                    <div class="dot"></div><span x-text="t('trackA')"></span>
                </div>
                <table class="rt">
                    <thead>
                        <tr>
                            <th x-text="t('dist')"></th>
                            <th style="color:var(--green)">Best</th>
                            <th style="color:var(--red)" x-text="t('colAllow')"></th>
                            <th style="color:var(--blue)" x-text="t('avg')"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(m, i) in rA" :key="run + '_a_' + i">
                            <tr :class="m.fin ? 'final' : ''">
                                <td class="col-dist" x-text="m.dist + ' m'"></td>
                                <td class="col-best"  x-text="m.best"></td>
                                <td class="col-allow" x-text="m.allow"></td>
                                <td class="col-avg"   x-text="m.avg"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Track B result table -->
            <div class="result-card red">
                <div class="result-card-head">
                    <div class="dot"></div><span x-text="t('trackB')"></span>
                </div>
                <table class="rt">
                    <thead>
                        <tr>
                            <th x-text="t('dist')"></th>
                            <th style="color:var(--green)">Best</th>
                            <th style="color:var(--red)" x-text="t('colAllow')"></th>
                            <th style="color:var(--blue)" x-text="t('avg')"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(m, i) in rB" :key="run + '_b_' + i">
                            <tr :class="m.fin ? 'final' : ''">
                                <td class="col-dist" x-text="m.dist + ' m'"></td>
                                <td class="col-best"  x-text="m.best"></td>
                                <td class="col-allow" x-text="m.allow"></td>
                                <td class="col-avg"   x-text="m.avg"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<div class="calc-bar">
    <button class="calc-btn" @click="calc()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span x-text="done ? t('recalc') : t('calc')"></span>
    </button>
</div>

<script>
function app() {
    return {
        lang: 'de',
        i18n: {
            de: {
                eyebrow:  '🏇 Kutschsport',
                title:    'Gel&auml;nde<em>Zeiten</em><br>Rechner',
                caption:  'Strecken eingeben',
                trackA:   'Aufw\u00e4rmstrecke',
                trackB:   'Hindernisstrecke',
                length:   'L\u00e4nge (m)',
                allowed:  'Erlaubt (min:sec)',
                calc:     'Berechnen',
                recalc:   'Neu berechnen',
                dist:     'Distanz',
                colAllow: 'Erlaubt',
                avg:      'Mittel'
            },
            en: {
                eyebrow:  '🏇 Carriage Sport',
                title:    'Cross-Country<br><em>Time</em> Calculator',
                caption:  'Enter Tracks',
                trackA:   'Warm-up Track',
                trackB:   'Obstacle Track',
                length:   'Length (m)',
                allowed:  'Allowed (min:sec)',
                calc:     'Calculate',
                recalc:   'Recalculate',
                dist:     'Distance',
                colAllow: 'Allowed',
                avg:      'Average'
            }
        },
        t(key) { return this.i18n[this.lang][key]; },

        A: { len: 4500, best: '12:00', allow: '14:00' },
        B: { len: 4200, best: '13:00', allow: '15:00' },
        e: {}, done: false, run: 0, rA: [], rB: [],

        calc() {
            if (!this.validate()) return;
            this.rA = this.milestones(this.A);
            this.rB = this.milestones(this.B);
            this.run += 1;
            this.done = true;
            this.$nextTick(() => { this.$refs.results.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); });
        },

        validate() {
            this.e = {};
            const isTime = v => /^\d{1,2}:\d{2}$/.test(v);
            const isPos  = v => +v > 0;
            if (!isPos(this.A.len))    this.e.Al = true;
            if (!isTime(this.A.best))  this.e.Ab = true;
            if (!isTime(this.A.allow)) this.e.Aa = true;
            if (!isPos(this.B.len))    this.e.Bl = true;
            if (!isTime(this.B.best))  this.e.Bb = true;
            if (!isTime(this.B.allow)) this.e.Ba = true;
            return Object.keys(this.e).length === 0;
        },

        milestones(tr) {
            const len = +tr.len, bSec = this.s(tr.best), aSec = this.s(tr.allow), mSec = (bSec+aSec)/2;
            const rows = [], steps = Math.floor(len/1000), rem = len%1000;
            for (let i = 1; i <= steps; i++) rows.push(this.row(i*1000, bSec, aSec, mSec, len, i===steps && rem===0));
            if (rem > 0) rows.push(this.row(len, bSec, aSec, mSec, len, true));
            return rows;
        },

        row(d, bSec, aSec, mSec, len, fin) {
            return { dist: d, best: this.f(bSec/len*d), allow: this.f(aSec/len*d), avg: this.f(mSec/len*d), fin };
        },

        s(ts) { const [m,sec] = ts.split(':').map(Number); return m*60+sec; },
        f(v)  { const m=Math.floor(v/60), s=Math.round(v%60); return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
    };
}
</script>
</body>
</html>
