<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#07100a"/>
  <!-- Horse carriage wheel -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#22c55e" stroke-width="28"/>
  <!-- Spokes -->
  <line x1="256" y1="36"  x2="256" y2="476" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <line x1="36"  y1="256" x2="476" y2="256" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="412" y2="412" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <line x1="412" y1="100" x2="100" y2="412" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
  <!-- Hub -->
  <circle cx="256" cy="256" r="36" fill="#22c55e"/>
  <!-- Timer arc (top right, red = allowed time) -->
  <path d="M 256 36 A 220 220 0 0 1 448 360" fill="none" stroke="#f87171" stroke-width="20" stroke-linecap="round"/>
  <!-- Timer arc (top right, yellow = best time) -->
  <path d="M 256 36 A 220 220 0 0 1 390 430" fill="none" stroke="#fbbf24" stroke-width="12" stroke-linecap="round"/>
</svg>
