<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fahrsport · Tools</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07100a;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.09);
            --border-hi: rgba(255,255,255,0.17);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --green-ring: rgba(34,197,94,0.28);
            --green-glow: rgba(34,197,94,0.30);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.10);
            --red-ring: rgba(248,113,113,0.26);
            --blue: #60a5fa;
            --yellow: #fbbf24;
            --text: #f1f5f9;
            --muted: rgba(241,245,249,0.46);
            --faint: rgba(241,245,249,0.24);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --r: 14px;
            --r-sm: 10px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            -webkit-text-size-adjust: 100%;
            overflow-x: hidden;
        }

        /* ── Sticky header ── */
        .app-header {
            position: sticky; top: 0; z-index: 200;
            background: rgba(7,16,10,0.95);
            backdrop-filter: blur(20px) saturate(1.6);
            -webkit-backdrop-filter: blur(20px) saturate(1.6);
            border-bottom: 1px solid var(--border);
            padding: max(12px, env(safe-area-inset-top)) 16px 0;
        }
        .header-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
        }
        .app-title { font-size: 13px; font-weight: 800; letter-spacing: .5px; color: var(--green); }
        .back-link {
            font-size: 11px; font-weight: 600; color: var(--muted);
            text-decoration: none; padding: 5px 11px;
            border: 1px solid var(--border); border-radius: 99px;
            transition: color .15s, border-color .15s;
        }
        .back-link:hover { color: var(--green); border-color: var(--green-ring); }
        .lang-btn {
            font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 1px;
            color: rgba(255,255,255,0.80); background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.20); border-radius: 99px;
            padding: 5px 12px; cursor: pointer;
            transition: background .2s, color .2s; -webkit-tap-highlight-color: transparent;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }

        /* ── Tab nav ── */
        .tab-nav { display: flex; gap: 2px; }
        .tab-btn {
            flex: 1; font-family: var(--font); font-size: 11px; font-weight: 700;
            letter-spacing: .5px; text-transform: uppercase; color: var(--muted);
            background: transparent; border: none; border-bottom: 2px solid transparent;
            padding: 10px 6px; cursor: pointer; white-space: nowrap;
            transition: color .18s, border-color .18s; -webkit-tap-highlight-color: transparent;
        }
        .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

        /* ── Main ── */
        .main {
            max-width: 640px; margin: 0 auto;
            padding: 24px 16px calc(max(40px, env(safe-area-inset-bottom)) + 20px);
        }
        .section-title { font-size: 20px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 4px; }
        .section-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

        /* ── Generic card ── */
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--r); overflow: hidden; margin-bottom: 12px;
            animation: fadeUp .3s ease both;
        }
        .card.green  { border-top: 2px solid var(--green); }
        .card.blue   { border-top: 2px solid var(--blue); }
        .card-head {
            display: flex; align-items: center; justify-content: space-between; gap: 9px;
            padding: 12px 16px; font-size: 12px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }
        .card-head-left { display: flex; align-items: center; gap: 9px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .green .dot { background: var(--green); box-shadow: 0 0 7px var(--green); }
        .blue  .dot { background: var(--blue);  box-shadow: 0 0 7px var(--blue); }
        .card-body { padding: 14px 16px 16px; }

        /* ── Inputs ── */
        .inp {
            width: 100%; font-size: 14px; font-family: var(--font); font-weight: 700;
            text-align: center; color: var(--text);
            background: rgba(255,255,255,0.055); border: 1px solid var(--border-hi);
            border-radius: var(--r-sm); padding: 8px 6px; min-height: 38px;
            outline: none; -webkit-appearance: none; appearance: none;
            transition: border-color .18s, background .18s, box-shadow .18s;
        }
        .inp:focus { border-color: var(--green); background: var(--green-dim); box-shadow: 0 0 0 3px var(--green-ring); }
        .inp-name { text-align: left; font-weight: 500; font-size: 13px; }
        .inp-sm   { max-width: 72px; }
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=number] { -moz-appearance: textfield; }

        /* ── Segmented control ── */
        .seg {
            display: inline-flex; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); border-radius: 99px; padding: 2px; gap: 1px;
        }
        .seg-btn {
            font-family: var(--font); font-size: 11px; font-weight: 700;
            color: var(--muted); background: transparent; border: none;
            border-radius: 99px; padding: 4px 10px; cursor: pointer;
            transition: background .15s, color .15s; -webkit-tap-highlight-color: transparent;
        }
        .seg-btn.active { background: var(--green); color: #000; }

        /* ── Icon button ── */
        .icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; background: none;
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--muted); cursor: pointer; flex-shrink: 0;
            transition: color .15s, border-color .15s, background .15s;
            -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:hover { color: var(--red); border-color: var(--red-ring); background: var(--red-dim); }
        .icon-btn:disabled { opacity: .35; pointer-events: none; }

        /* ── Add button ── */
        .add-btn {
            display: flex; align-items: center; gap: 6px; justify-content: center;
            width: 100%; padding: 10px; font-family: var(--font);
            font-size: 12px; font-weight: 700; letter-spacing: .5px; color: var(--muted);
            background: rgba(255,255,255,0.04); border: 1px dashed var(--border-hi);
            border-radius: var(--r-sm); cursor: pointer; margin-top: 8px;
            transition: color .15s, border-color .15s, background .15s;
            -webkit-tap-highlight-color: transparent;
        }
        .add-btn:hover { color: var(--green); border-color: var(--green-ring); background: var(--green-dim); }

        /* ── Stat boxes ── */
        .summary-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 16px;
        }
        @media (min-width: 400px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-box {
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: var(--r-sm); padding: 10px 12px; text-align: center;
        }
        .stat-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
        .stat-value { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .c-green  { color: var(--green); }
        .c-red    { color: var(--red); }
        .c-blue   { color: var(--blue); }
        .c-yellow { color: var(--yellow); }

        /* ════════════════════════════════════
           DRESSUR
           ════════════════════════════════════ */
        .dressur-table { width: 100%; border-collapse: collapse; }
        .dressur-table th {
            font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--muted); padding: 0 4px 8px; text-align: left;
        }
        .dressur-table th.center { text-align: center; }
        .dressur-table td { padding: 4px 4px; vertical-align: middle; }
        .dressur-table tbody tr { border-top: 1px solid var(--border); }
        .dressur-table tbody tr:first-child { border-top: none; }

        .factor-row {
            display: flex; align-items: center; gap: 10px;
            margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
        }
        .factor-label { font-size: 11px; color: var(--muted); font-weight: 600; flex-shrink: 0; }

        /* ════════════════════════════════════
           MARATHON TIMER
           ════════════════════════════════════ */
        .phase-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--r); margin-bottom: 16px; overflow: hidden;
            animation: fadeUp .3s ease both;
        }
        .phase-card.green { border-top: 2px solid var(--green); }
        .phase-card.red   { border-top: 2px solid var(--red); }

        .phase-head {
            display: flex; align-items: center; gap: 9px;
            padding: 12px 16px; border-bottom: 1px solid var(--border);
        }
        .phase-name-inp {
            flex: 1; font-size: 13px; font-family: var(--font); font-weight: 700;
            letter-spacing: .5px; color: var(--text);
            background: transparent; border: none; outline: none;
        }

        .phase-cfg {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 10px;
        }
        .cfg-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
        .cfg-field { display: flex; flex-direction: column; flex: 1; min-width: 72px; }
        .cfg-field label {
            font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
        }
        .inp:disabled { opacity: .5; pointer-events: none; }

        .phase-body { padding: 14px 16px 16px; }

        /* Big timer */
        .timer-big {
            text-align: center; font-size: 58px; font-weight: 900;
            letter-spacing: -2px; font-variant-numeric: tabular-nums;
            margin: 4px 0 8px; color: var(--faint);
            transition: color .25s; line-height: 1;
        }
        .timer-big.running { color: var(--green); }
        .timer-big.warn    { color: var(--yellow); }
        .timer-big.over    { color: var(--red); animation: pulse 1s ease-in-out infinite; }
        .timer-big.done-ok { color: var(--blue); }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.55; } }

        /* Progress bar */
        .progress-track {
            position: relative; height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px; overflow: visible; margin: 4px 0 5px;
        }
        .pb-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            border-radius: 99px;
            transition: width .1s linear, background .3s;
            background: var(--faint);
        }
        .pb-fill.running { background: var(--green); }
        .pb-fill.warn    { background: var(--yellow); }
        .pb-fill.over    { background: var(--red); }
        .pb-fill.done-ok { background: var(--blue); }
        .pb-best {
            position: absolute; top: -3px; width: 2px; height: 12px;
            background: rgba(255,255,255,0.30); border-radius: 1px;
            transform: translateX(-50%);
        }
        .pb-labels {
            display: flex; justify-content: space-between; margin-bottom: 14px;
            font-size: 9px; font-weight: 600; letter-spacing: 1px;
            text-transform: uppercase; color: var(--faint);
        }

        /* Controls */
        .timer-controls { display: flex; gap: 8px; margin-bottom: 14px; }
        .t-btn {
            flex: 1; padding: 13px; font-family: var(--font);
            font-size: 14px; font-weight: 700; border: none;
            border-radius: var(--r-sm); cursor: pointer;
            transition: opacity .18s, transform .14s; -webkit-tap-highlight-color: transparent;
        }
        .t-btn:active { transform: scale(.97); opacity: .82; }
        .t-btn.start { background: var(--green); color: #000; box-shadow: 0 0 20px var(--green-glow); }
        .t-btn.stop  { background: var(--red);   color: #fff; }
        .t-btn.reset { background: rgba(255,255,255,0.10); color: var(--text); }

        /* km Milestone grid */
        .ms-caption {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--faint); margin-bottom: 8px;
        }
        .ms-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
        }
        @media (min-width: 380px) { .ms-grid { grid-template-columns: repeat(4, 1fr); } }

        .ms-btn {
            padding: 9px 4px; font-family: var(--font);
            background: rgba(255,255,255,0.04); color: var(--muted);
            border: 1px solid var(--border); border-radius: var(--r-sm);
            cursor: pointer; text-align: center;
            transition: background .2s, border-color .2s, color .2s;
            -webkit-tap-highlight-color: transparent;
        }
        .ms-btn .ms-dist  { display: block; font-size: 10px; font-weight: 800; }
        .ms-btn .ms-allow { display: block; font-size: 11px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
        .ms-btn .ms-delta { display: block; font-size: 9px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
        /* Auto-color: warning zone */
        .ms-btn.ms-warn {
            background: rgba(251,191,36,0.10); border-color: rgba(251,191,36,0.35); color: var(--yellow);
        }
        /* Auto-color: allowed time passed — driver is late for this km */
        .ms-btn.ms-over {
            background: rgba(248,113,113,0.16); border-color: rgba(248,113,113,0.45); color: var(--red);
        }
        /* Tapped: arrived late */
        .ms-btn.ms-late {
            background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.40); color: var(--red);
        }
        /* Tapped: arrived in time */
        .ms-btn.ms-ok {
            background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.35); color: var(--green);
        }
        .ms-btn:disabled { cursor: default; opacity: .45; }

        /* ── Shared ── */
        .hr { height: 1px; background: linear-gradient(90deg, transparent, var(--border-hi), transparent); margin: 20px 0; }

        .page-footer {
            margin-top: 36px; padding-bottom: 8px;
            text-align: center; font-size: 11px; color: var(--faint); line-height: 1.8;
        }
        .page-footer a {
            color: var(--faint); text-decoration: none;
            border-bottom: 1px solid rgba(241,245,249,0.15);
            transition: color .15s, border-color .15s;
        }
        .page-footer a:hover { color: var(--green); border-color: var(--green); }

        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="tools()">

<!-- ── Header ── -->
<div class="app-header">
    <div class="header-row">
        <a href="index.html" class="back-link">← Marathon</a>
        <span class="app-title">🏇 Fahrsport Tools</span>
        <button class="lang-btn" @click="lang = lang==='de' ? 'en' : 'de'" x-text="lang==='de' ? 'EN' : 'DE'"></button>
    </div>
    <div class="tab-nav">
        <button class="tab-btn" style="cursor:default; color:var(--green); border-bottom-color:var(--green)">🎩 <span x-text="t('tabDressur')"></span></button>
    </div>
</div>

<div class="main">

    <!-- ══════════════════════════════════════════
         TAB 1 · DRESSUR
         ══════════════════════════════════════════ -->
    <div>
        <h2 class="section-title" x-text="t('dressurTitle')"></h2>
        <p class="section-sub" x-text="t('dressurSub')"></p>

        <!-- Movements list -->
        <div class="card green">
            <div class="card-head">
                <div class="card-head-left"><div class="dot"></div><span x-text="t('movements')"></span></div>
            </div>
            <div class="card-body" style="padding:10px 12px 14px">
                <table class="dressur-table">
                    <thead>
                        <tr>
                            <th x-text="t('movement')"></th>
                            <th class="center" x-text="t('coeff')" style="width:82px"></th>
                            <th class="center" x-text="t('mark')"  style="width:70px"></th>
                            <th style="width:34px"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(m, i) in dMovements" :key="m.id">
                            <tr>
                                <td>
                                    <input class="inp inp-name" type="text" x-model="m.name" :placeholder="t('movPlaceholder')">
                                </td>
                                <td style="text-align:center; padding:4px 6px">
                                    <div class="seg">
                                        <button class="seg-btn" :class="m.coeff===1 && 'active'" @click="m.coeff=1">1×</button>
                                        <button class="seg-btn" :class="m.coeff===2 && 'active'" @click="m.coeff=2">2×</button>
                                    </div>
                                </td>
                                <td style="text-align:center">
                                    <input class="inp inp-sm" type="number" x-model.number="m.mark"
                                        min="0" max="10" step="0.5" placeholder="—" inputmode="decimal">
                                </td>
                                <td>
                                    <button class="icon-btn" @click="dMovements.splice(i,1)" :title="t('remove')">
                                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
                <button class="add-btn" @click="addMovement()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span x-text="t('addMovement')"></span>
                </button>
            </div>
        </div>

        <!-- Result summary -->
        <div class="card">
            <div class="card-head">
                <div class="card-head-left">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                    <span x-text="t('summary')"></span>
                </div>
            </div>
            <div class="card-body">
                <div class="summary-grid">
                    <div class="stat-box">
                        <div class="stat-label" x-text="t('reached')"></div>
                        <div class="stat-value c-blue" x-text="dTotal.toFixed(1)"></div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label" x-text="t('maximum')"></div>
                        <div class="stat-value" x-text="dMax.toFixed(0)"></div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">%</div>
                        <div class="stat-value c-green" x-text="dMax > 0 ? (dTotal/dMax*100).toFixed(1)+'%' : '—'"></div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label" x-text="t('penalty')"></div>
                        <div class="stat-value c-red" x-text="dMax > 0 ? dPenalty.toFixed(2) : '—'"></div>
                    </div>
                </div>

                <!-- Conversion factor -->
                <div class="factor-row">
                    <span class="factor-label" x-text="t('factor')"></span>
                    <input class="inp inp-sm" type="number" x-model.number="dFactor"
                        min="0.01" max="2" step="0.01" inputmode="decimal">
                    <span style="font-size:11px; color:var(--muted);" x-text="t('factorHint')"></span>
                </div>
                <!-- Formula hint -->
                <p style="font-size:10px; color:var(--faint); margin-top:10px; line-height:1.5" x-text="t('formula')"></p>
            </div>
        </div>
    </div><!-- /dressur -->

    <footer class="page-footer">
        <p>&copy; 2026 Thorsten Hillmer</p>
        <p><a href="https://github.com/thhillmi/GelaendeZeitenRechner" target="_blank" rel="noopener">github.com/thhillmi/GelaendeZeitenRechner</a></p>
    </footer>

</div><!-- /.main -->

<script>
function tools() {
    return {
        lang: 'de',

        // ── i18n ──────────────────────────────────────────────────────
        i18n: {
            de: {
                tabDressur: 'Dressur',

                dressurTitle:'Dressur-Rechner',
                dressurSub:     'Noten (0–10) pro Lektion eingeben – Strafpunkte werden automatisch berechnet.',
                movements:      'Lektionen',
                movement:       'Lektion',
                coeff:          'Koeff.',
                mark:           'Note',
                movPlaceholder: 'Lektion',
                addMovement:    'Lektion hinzufügen',
                summary:        'Ergebnis',
                reached:        'Erreicht',
                maximum:        'Maximum',
                penalty:        'Strafpunkte',
                remove:         'Entfernen',
                factor:         'Umrechnungsfaktor',
                factorHint:     '(Standard FEI: 0.4)',
                formula:        'Formel: Strafpunkte = (Maximum − Erreicht) × Faktor',
            },
            en: {
                tabDressur: 'Dressage',

                dressurTitle:'Dressage Calculator',
                dressurSub:     'Enter marks (0–10) per movement – penalty points are calculated automatically.',
                movements:      'Movements',
                movement:       'Movement',
                coeff:          'Coeff.',
                mark:           'Mark',
                movPlaceholder: 'Movement',
                addMovement:    'Add movement',
                summary:        'Result',
                reached:        'Achieved',
                maximum:        'Maximum',
                penalty:        'Penalties',
                remove:         'Remove',
                factor:         'Conversion factor',
                factorHint:     '(FEI standard: 0.4)',
                formula:        'Formula: Penalties = (Maximum − Achieved) × Factor',
            },
        },
        t(k) { return this.i18n[this.lang][k] ?? k; },

        // ── DRESSUR ──────────────────────────────────────────────────
        dMovements: [
            { id: 1, name: 'Einreiten',              coeff: 1, mark: null },
            { id: 2, name: 'Anhalten, Grüßen',       coeff: 2, mark: null },
            { id: 3, name: 'Schritt',                 coeff: 1, mark: null },
            { id: 4, name: 'Arbeitstrab',             coeff: 1, mark: null },
            { id: 5, name: 'Verlängerter Trab',       coeff: 1, mark: null },
            { id: 6, name: 'Volte links',             coeff: 1, mark: null },
            { id: 7, name: 'Volte rechts',            coeff: 1, mark: null },
            { id: 8, name: 'Schlangenlinien',         coeff: 1, mark: null },
            { id: 9, name: 'Anhalten, Abgrüßen',     coeff: 2, mark: null },
            { id:10, name: 'Gesamteindruck',          coeff: 2, mark: null },
        ],
        dFactor: 0.4,
        _dNextId: 11,

        addMovement() {
            this.dMovements.push({ id: this._dNextId++, name: '', coeff: 1, mark: null });
        },

        get dTotal() {
            return this.dMovements.reduce((s, m) => s + (m.mark != null ? +m.mark * m.coeff : 0), 0);
        },
        get dMax() {
            return this.dMovements.reduce((s, m) => s + 10 * m.coeff, 0);
        },
        get dPenalty() {
            return (this.dMax - this.dTotal) * this.dFactor;
        },
    };
}
</script>
